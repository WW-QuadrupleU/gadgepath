name: Refresh Rakuten Product Data

on:
  schedule:
    - cron: '0 17 * * 6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without updating Notion'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  issues: write

jobs:
  refresh:
    name: Refresh product prices
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh prices
        id: refresh
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PRODUCTS_DB_ID: ${{ secrets.NOTION_PRODUCTS_DB_ID }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/refresh_prices.mjs --dry
          else
            node scripts/refresh_prices.mjs
          fi

      - name: Trigger Vercel deploy
        if: ${{ success() && github.event.inputs.dry_run != 'true' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not set. Skipping deploy hook."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Rakuten product refresh failed: ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              'The scheduled Rakuten product refresh failed.',
              '',
              `Workflow: ${context.workflow}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Please inspect the run logs and rerun after fixing the cause.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automation', 'maintenance']
            });
